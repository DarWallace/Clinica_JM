name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug
          extensions: sqlite, pdo_sqlite, mbstring

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader


      - name: Copy and configure environment for SQLite
        run: |
          cp .env.example .env
          # Configurar sqlite para CI
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env || true
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env || true
          mkdir -p database
          touch database/database.sqlite
          # Asegurar permisos y existencia para entornos CI
          chmod 666 database/database.sqlite || true
          # Mostrar las variables db relevantes para debugging en CI
          echo "DB_CONNECTION=$(grep '^DB_CONNECTION' .env || true)"
          echo "DB_DATABASE=$(grep '^DB_DATABASE' .env || true)"

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/phpunit
